name: Scrape GombaShop sites

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python gombashop_scraper.py \
            --search-backend auto \
            --out gombashop_sites.xlsx \
            --include-rejected

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: gombashop-sites
          path: gombashop_sites.xlsx
