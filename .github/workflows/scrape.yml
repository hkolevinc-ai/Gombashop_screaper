name: GombaShop Scraper v3

on:
  workflow_dispatch:
    inputs:
      search_backend:
        description: "Search backend: auto, serpapi, bing, google_cse, duckduckgo, none"
        required: true
        default: "auto"
      target_candidates:
        description: "Candidate domains to discover before validation"
        required: true
        default: "8000"
      max_queries:
        description: "Max generated search queries"
        required: true
        default: "220"
      include_rejected:
        description: "Include rejected candidates sheet"
        required: true
        default: "true"
      contact_pages:
        description: "Contact/legal pages per site. Use 2-4 for big runs."
        required: true
        default: "3"

permissions:
  contents: read

env:
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scraper
        continue-on-error: true
        run: |
          set -o pipefail
          INCLUDE=""
          if [ "${{ github.event.inputs.include_rejected }}" = "true" ]; then INCLUDE="--include-rejected"; fi
          python gombashop_scraper.py \
            --search-backend "${{ github.event.inputs.search_backend }}" \
            --target-candidates "${{ github.event.inputs.target_candidates }}" \
            --max-queries "${{ github.event.inputs.max_queries }}" \
            --search-limit-per-query 100 \
            --ct-gombashop \
            --urlscan-gombashop \
            --workers 20 \
            --contact-pages "${{ github.event.inputs.contact_pages }}" \
            --search-delay 0.2 \
            --request-delay 0.02 \
            --checkpoint-csv gombashop_progress.csv \
            --checkpoint-every 50 \
            --out gombashop_sites.xlsx \
            $INCLUDE 2>&1 | tee scraper.log

      - name: List output files
        if: always()
        run: |
          ls -lah
          test -f gombashop_sites.xlsx && echo "XLSX generated" || echo "XLSX not generated"
          test -f gombashop_progress.csv && echo "Progress CSV generated" || echo "Progress CSV not generated"

      - name: Upload scraper outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gombashop-sites
          path: |
            gombashop_sites.xlsx
            gombashop_progress.csv
            scraper.log
          if-no-files-found: warn
